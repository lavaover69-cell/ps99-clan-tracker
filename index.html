<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS99 Clan Tracker</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 { text-align:center; }

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  margin: 5px 0;
  border: none;
  background: #2563eb;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #1e293b;
}

th {
  background: #2563eb;
  padding: 10px;
}

td {
  padding: 8px;
  text-align: center;
  border-bottom: 1px solid #334155;
}

#status {
  text-align: center;
  opacity: 0.8;
}
</style>
</head>

<body>

<h1>🏆 PS99 Clan Tracker</h1>

<div id="status">Loading...</div>

<input id="search" placeholder="Search clan name...">
<input id="jump" placeholder="Find my clan (exact name)">
<button onclick="findClan()">Find Clan</button>
<button onclick="loadMore()">Load More Pages</button>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Clan</th>
<th>Points</th>
<th>Members</th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>

<script>

let clans = [];
let page = 1;

function formatNumber(x){
  return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

async function loadPage(p){
  const url =
  `https://ps99.biggamesapi.io/api/clans?page=${p}&pageSize=100&sort=Points&sortOrder=desc`;

  const res = await fetch(url);
  const json = await res.json();

  return json.data || [];
}

async function loadInitial(){
  clans = await loadPage(1);
  render(clans);

  document.getElementById("status").innerText =
  "Loaded page 1";
}

async function loadMore(){
  page++;
  const more = await loadPage(page);
  clans = clans.concat(more);
  render(clans);

  document.getElementById("status").innerText =
  "Loaded page " + page;
}

function render(data){
  const body = document.getElementById("body");
  body.innerHTML = "";

  data.forEach((c,i)=>{
    body.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${c.Name}</td>
        <td>${formatNumber(c.Points)}</td>
        <td>${c.Members}</td>
      </tr>
    `;
  });
}

document.getElementById("search").addEventListener("input",function(){
  const v = this.value.toLowerCase();
  render(clans.filter(c => c.Name.toLowerCase().includes(v)));
});

function findClan(){
  const name = document.getElementById("jump").value.toLowerCase();

  const clan = clans.find(c => c.Name.toLowerCase() === name);

  if(!clan){
    alert("Clan not loaded yet. Load more pages.");
    return;
  }

  alert(
    clan.Name +
    " | Points: " +
    formatNumber(clan.Points)
  );
}

loadInitial();

setInterval(loadInitial,60000);

</script>

</body>
</html>
