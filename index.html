<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS99 Clan Tracker</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    padding:20px;
    margin:0;
}

h1{
    text-align:center;
}

#battleName{
    text-align:center;
    font-size:20px;
    margin-bottom:15px;
    color:#60a5fa;
}

#status{
    text-align:center;
    opacity:.8;
    margin-bottom:10px;
}

#podium{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:20px;
    margin:20px 0;
    text-align:center;
}

.podium-card{
    background:#1e293b;
    border-radius:12px;
    padding:15px;
    min-width:140px;
}

.first{
    font-size:24px;
    border:2px solid gold;
}

.second{
    border:2px solid silver;
}

.third{
    border:2px solid #cd7f32;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-bottom:15px;
    box-sizing:border-box;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#1e293b;
}

th{
    background:#2563eb;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #334155;
    text-align:center;
}

tr:hover{
    background:#334155;
}

a{
    color:#60a5fa;
    text-decoration:none;
    font-weight:bold;
}

a:hover{
    text-decoration:underline;
}

#controls{
    text-align:center;
    margin:15px 0;
}

button{
    padding:8px 15px;
    border:none;
    border-radius:6px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}
</style>
</head>

<body>

<h1>🏆 PS99 Clan Tracker</h1>

<div id="battleName">
Loading clan battle...
</div>

<div id="podium"></div>

<div id="status">
Loading clans...
</div>

<input
id="search"
type="text"
placeholder="Search any loaded clan..."
>

<div id="controls">
    <button onclick="prevPage()">⬅ Prev</button>
    <span id="pageInfo">Page 1</span>
    <button onclick="nextPage()">Next ➡</button>
</div>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Clan</th>
<th>Points</th>
<th>Members</th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>

<script>

let page = 1;
let allClans = [];

function commas(x){
    return Number(x).toLocaleString();
}

async function loadBattle(){

    try{

        const res = await fetch(
            "https://ps99.biggamesapi.io/api/activeClanBattle"
        );

        const json = await res.json();

        document.getElementById("battleName").innerHTML =
            "🏆 Current Clan Battle: " +
            (json?.data?.Name || "Unknown");

    }catch{

        document.getElementById("battleName").innerHTML =
            "🏆 Current Clan Battle";
    }
}

async function loadAllClans(){

    allClans = [];

    let currentRank = 1;

    for(let p=1;p<=10;p++){

        try{

            const res = await fetch(
                `https://ps99.biggamesapi.io/api/clans?page=${p}&pageSize=100&sort=Points&sortOrder=desc`
            );

            const json = await res.json();

            if(!json.data || json.data.length === 0){
                break;
            }

            json.data.forEach(clan => {

                clan.rank = currentRank++;

                allClans.push(clan);

            });

        }catch{
            break;
        }
    }

    document.getElementById("status").innerHTML =
        "Loaded " + allClans.length + " clans";

    renderPage(1);
}

function renderPage(p){

    page = p;

    const start = (p - 1) * 100;
    const end = start + 100;

    const pageClans = allClans.slice(start,end);

    document.getElementById("pageInfo").innerHTML =
        "Page " + p;

    const body = document.getElementById("body");

    body.innerHTML = "";

    if(p === 1 && allClans.length >= 3){

        document.getElementById("podium").innerHTML = `
        <div class="podium-card second">
            <div style="font-size:32px;">🥈</div>
            <div><strong>${allClans[1].Name}</strong></div>
            <div>#2</div>
        </div>

        <div class="podium-card first">
            <div style="font-size:40px;">🥇</div>
            <div><strong>${allClans[0].Name}</strong></div>
            <div>#1</div>
        </div>

        <div class="podium-card third">
            <div style="font-size:32px;">🥉</div>
            <div><strong>${allClans[2].Name}</strong></div>
            <div>#3</div>
        </div>
        `;
    }
    else{
        document.getElementById("podium").innerHTML = "";
    }

    pageClans.forEach(clan => {

        let medal = "";

        if(clan.rank === 1){
            medal = "🥇 ";
        }
        else if(clan.rank === 2){
            medal = "🥈 ";
        }
        else if(clan.rank === 3){
            medal = "🥉 ";
        }

        body.innerHTML += `
        <tr>
            <td>#${clan.rank}</td>

            <td>
                <a href="clan.html?name=${encodeURIComponent(clan.Name)}">
                    ${medal}${clan.Name}
                </a>
            </td>

            <td>${commas(clan.Points)}</td>

            <td>${clan.Members}</td>
        </tr>
        `;
    });
}

function nextPage(){

    const maxPage =
      Math.ceil(allClans.length / 100);

    if(page < maxPage){
        renderPage(page + 1);
    }
}

function prevPage(){

    if(page > 1){
        renderPage(page - 1);
    }
}

document.getElementById("search")
.addEventListener("input",function(){

    const search =
      this.value.toLowerCase();

    if(search === ""){

        renderPage(page);
        return;
    }

    document.getElementById("podium").innerHTML = "";

    const filtered =
      allClans.filter(c =>
        c.Name.toLowerCase().includes(search)
      );

    document.getElementById("pageInfo").innerHTML =
      "Search Results";

    const body =
      document.getElementById("body");

    body.innerHTML = "";

    filtered.forEach(clan => {

        let medal = "";

        if(clan.rank === 1){
            medal = "🥇 ";
        }
        else if(clan.rank === 2){
            medal = "🥈 ";
        }
        else if(clan.rank === 3){
            medal = "🥉 ";
        }

        body.innerHTML += `
        <tr>
            <td>#${clan.rank}</td>

            <td>
                <a href="clan.html?name=${encodeURIComponent(clan.Name)}">
                    ${medal}${clan.Name}
                </a>
            </td>

            <td>${commas(clan.Points)}</td>

            <td>${clan.Members}</td>
        </tr>
        `;
    });

});

loadBattle();
loadAllClans();

setInterval(loadBattle,60000);
setInterval(loadAllClans,60000);

</script>

</body>
</html>
