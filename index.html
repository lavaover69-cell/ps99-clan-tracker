<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS99 Clan Tracker</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 { text-align:center; }

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #1e293b;
}

th {
  background: #2563eb;
  padding: 10px;
}

td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #334155;
}

#controls {
  text-align:center;
  margin: 10px 0;
}

button {
  padding: 8px 12px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

#status {
  text-align:center;
  opacity:0.8;
}
</style>
</head>

<body>

<h1>🏆 PS99 Clan Tracker</h1>

<div id="status">Loading...</div>

<input id="search" placeholder="Search ANY clan (global search enabled)">

<div id="controls">
  <button onclick="prevPage()">⬅ Prev</button>
  <span id="pageInfo">Page 1</span>
  <button onclick="nextPage()">Next ➡</button>
</div>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Clan</th>
<th>Points</th>
<th>Members</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<script>

let page = 1;
let allClans = [];

function formatNumber(x){
  return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

// load multiple pages into memory (for global search + rank accuracy)
async function loadAllPages(maxPages = 10){

  allClans = [];

  for(let p = 1; p <= maxPages; p++){

    const url =
    `https://ps99.biggamesapi.io/api/clans?page=${p}&pageSize=100&sort=Points&sortOrder=desc`;

    const res = await fetch(url);
    const json = await res.json();

    if(!json.data) break;

    json.data.forEach((c, i) => {
      allClans.push({
        ...c,
        globalRank: (p - 1) * 100 + i + 1
      });
    });
  }

  renderPage(page);

  document.getElementById("status").innerText =
  "Loaded " + allClans.length + " clans";
}

function renderPage(p){

  document.getElementById("pageInfo").innerText =
  "Page " + p;

  const start = (p - 1) * 100;
  const pageData = allClans.slice(start, start + 100);

  const body = document.getElementById("body");
  body.innerHTML = "";

  pageData.forEach(c => {
    body.innerHTML += `
      <tr>
        <td>${c.globalRank}</td>
        <td>${c.Name}</td>
        <td>${formatNumber(c.Points)}</td>
        <td>${c.Members}</td>
      </tr>
    `;
  });
}

function nextPage(){
  page++;
  renderPage(page);
}

function prevPage(){
  if(page > 1){
    page--;
    renderPage(page);
  }
}

// GLOBAL SEARCH (THIS FIXES YOUR ISSUE)
document.getElementById("search").addEventListener("input",function(){

  const v = this.value.toLowerCase();

  const filtered = allClans.filter(c =>
    c.Name.toLowerCase().includes(v)
  );

  const body = document.getElementById("body");
  body.innerHTML = "";

  filtered.forEach(c => {
    body.innerHTML += `
      <tr>
        <td>${c.globalRank}</td>
        <td>${c.Name}</td>
        <td>${formatNumber(c.Points)}</td>
        <td>${c.Members}</td>
      </tr>
    `;
  });

  document.getElementById("pageInfo").innerText =
  "Search results: " + filtered.length;
});

loadAllPages();

setInterval(() => loadAllPages(), 60000);

</script>

</body>
</html>
