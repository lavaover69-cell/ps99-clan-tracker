<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS99 Clan Tracker</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 {
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #1e293b;
}

th {
  background: #2563eb;
  padding: 10px;
}

td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #334155;
}

#controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin: 15px 0;
}

button {
  padding: 8px 14px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:disabled {
  background: #334155;
  cursor: not-allowed;
}

#status {
  text-align: center;
  opacity: 0.8;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>🏆 PS99 Clan Tracker</h1>

<div id="status">Loading...</div>

<input id="search" placeholder="Search clans (current page only)">

<div id="controls">
  <button onclick="prevPage()" id="prevBtn">⬅ Prev</button>
  <span id="pageInfo">Page 1</span>
  <button onclick="nextPage()" id="nextBtn">Next ➡</button>
</div>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Clan</th>
<th>Points</th>
<th>Members</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<script>

let page = 1;
let dataCache = [];

function formatNumber(x){
  return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

async function loadPage(p){

  document.getElementById("status").innerText = "Loading...";

  const url =
  `https://ps99.biggamesapi.io/api/clans?page=${p}&pageSize=100&sort=Points&sortOrder=desc`;

  const res = await fetch(url);
  const json = await res.json();

  dataCache = json.data || [];

  render(dataCache, p);

  document.getElementById("status").innerText =
  "Updated: " + new Date().toLocaleTimeString();

  document.getElementById("pageInfo").innerText =
  "Page " + p;

  document.getElementById("prevBtn").disabled = (p === 1);
}

function render(data, p){

  const body = document.getElementById("body");
  body.innerHTML = "";

  const startRank = (p - 1) * 100;

  data.forEach((c,i)=>{
    body.innerHTML += `
      <tr>
        <td>${startRank + i + 1}</td>
        <td>${c.Name}</td>
        <td>${formatNumber(c.Points)}</td>
        <td>${c.Members}</td>
      </tr>
    `;
  });
}

function nextPage(){
  page++;
  loadPage(page);
}

function prevPage(){
  if(page > 1){
    page--;
    loadPage(page);
  }
}

document.getElementById("search").addEventListener("input",function(){

  const v = this.value.toLowerCase();

  const filtered = dataCache.filter(c =>
    c.Name.toLowerCase().includes(v)
  );

  render(filtered, page);
});

loadPage(page);

setInterval(()=>loadPage(page),60000);

</script>

</body>
</html>
