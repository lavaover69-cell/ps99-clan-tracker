<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS99 Clan Profile</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
    padding:30px;
}

.card{
    max-width:800px;
    margin:auto;
    background:#1e293b;
    border-radius:12px;
    padding:25px;
}

h1{
    text-align:center;
}

.info{
    margin:12px 0;
    font-size:18px;
}

.value{
    color:#60a5fa;
}

.back{
    display:inline-block;
    margin-bottom:20px;
    color:#60a5fa;
    text-decoration:none;
}

.back:hover{
    text-decoration:underline;
}

#icon{
    display:block;
    margin:auto;
    max-width:200px;
    max-height:200px;
}

#battleName{
    text-align:center;
    color:#60a5fa;
    margin-bottom:20px;
    font-size:20px;
}
</style>
</head>

<body>

<div class="card">

<a class="back" href="./">
⬅ Back to Leaderboard
</a>

<div id="battleName">
🏆 Clan Battle: Loading...
</div>

<h1 id="clanName">
Loading...
</h1>

<img id="icon" style="display:none;">

<div class="info">
Rank:
<span id="rank" class="value">-</span>
</div>

<div class="info">
Points:
<span id="points" class="value">-</span>
</div>

<div class="info">
Members:
<span id="members" class="value">-</span>
</div>

<div class="info">
Gems Donated:
<span id="diamonds" class="value">-</span>
</div>

<div class="info">
Country:
<span id="country" class="value">-</span>
</div>

</div>

<script>

function commas(x){
    return Number(x || 0).toLocaleString();
}

const countries = {
  GB:"United Kingdom",
  US:"United States",
  JP:"Japan",
  NL:"Netherlands",
  PH:"Philippines",
  XK:"Kosovo",
  CA:"Canada",
  AU:"Australia",
  DE:"Germany",
  FR:"France",
  IT:"Italy",
  ES:"Spain",
  BR:"Brazil",
  MX:"Mexico",
  KR:"South Korea",
  CN:"China",
  IN:"India",
  RU:"Russia",
  SE:"Sweden",
  NO:"Norway",
  DK:"Denmark",
  FI:"Finland",
  PL:"Poland",
  TR:"Turkey"
};

const params = new URLSearchParams(window.location.search);
const clanName = params.get("name");

document.getElementById("clanName").textContent =
clanName || "Unknown Clan";

async function loadClan(){

    let rank = 1;
    let found = null;

    for(let page = 1; page <= 10; page++){

        try{

            const url =
            `https://ps99.biggamesapi.io/api/clans?page=${page}&pageSize=100&sort=Points&sortOrder=desc`;

            const res = await fetch(url);
            const json = await res.json();

            if(!json.data) break;

            for(const clan of json.data){

                if(
                    clan.Name.toLowerCase() ===
                    clanName.toLowerCase()
                ){
                    found = clan;
                    found.rank = rank;
                    break;
                }

                rank++;
            }

            if(found) break;

        }catch(err){
            console.error(err);
            break;
        }
    }

    if(!found){

        document.getElementById("clanName").textContent =
        "Clan Not Found";

        return;
    }

    document.getElementById("rank").textContent =
    "#" + found.rank;

    document.getElementById("points").textContent =
    commas(found.Points);

    document.getElementById("members").textContent =
    `${found.Members}/${found.MemberCapacity}`;

    document.getElementById("diamonds").textContent =
    commas(found.DepositedDiamonds);

    const code = found.CountryCode || "Unknown";

    document.getElementById("country").textContent =
    countries[code]
      ? `${code} (${countries[code]})`
      : code;

    if(found.Icon){

        const assetId =
        found.Icon.replace("rbxassetid://","");

        const img =
        document.getElementById("icon");

        img.style.display = "block";

        img.src =
        `https://tr.rbxcdn.com/30DAY-Asset.ashx?aid=${assetId}&fmt=png`;

        img.onerror = function(){
            img.style.display = "none";
        };
    }
}

async function loadBattle(){

    try{

        const res =
        await fetch(
            "https://ps99.biggamesapi.io/api/activeClanBattle"
        );

        const json = await res.json();

        document.getElementById("battleName").textContent =
        "🏆 Clan Battle: " +
        (json?.data?.Name || "Unknown");

    }catch{

        document.getElementById("battleName").textContent =
        "🏆 Clan Battle";
    }
}

loadClan();
loadBattle();

</script>

</body>
</html>
